replicaCount: 1

image:
  repository: supertokens/supertokens-postgresql
  tag: "9.3.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3567

# PostgreSQL credentials secret
# useSecret: false  → in-memory mode (local/k3d only — data does not persist)
# useUri: true      → secret has POSTGRESQL_CONNECTION_URI key
# useUri: false     → secret has individual keys: POSTGRESQL_HOST/PORT/USER/PASSWORD/DATABASE_NAME
db:
  useSecret: true
  useUri: true
  secretName: supertokens-db
  connectionUriKey: POSTGRESQL_CONNECTION_URI

# Optional: namespace-prefix for all SuperTokens tables in Postgres
tableNamesPrefix: ""

# Optional API key to protect the core (leave enabled: false for internal-only clusters)
apiKey:
  enabled: false
  secretName: supertokens-api-key
  secretKey: API_KEYS

# Disable usage analytics sent to SuperTokens servers
disableTelemetry: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
