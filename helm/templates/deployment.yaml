apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supertokens.fullname" . }}
  labels:
    {{- include "supertokens.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "supertokens.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "supertokens.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: supertokens
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3567
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: POSTGRESQL_CONNECTION_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName }}
                  key: {{ .Values.db.connectionUriKey }}
            {{- if .Values.apiKey.enabled }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.secretName }}
                  key: {{ .Values.apiKey.secretKey }}
            {{- end }}
            - name: DISABLE_TELEMETRY
              value: {{ .Values.disableTelemetry | quote }}
            {{- if .Values.tableNamesPrefix }}
            - name: POSTGRESQL_TABLE_NAMES_PREFIX
              value: {{ .Values.tableNamesPrefix | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
